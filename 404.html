<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seite nicht gefunden · Digitales Gehirn</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#03040a">
  <style>
    html,body{height:100%;margin:0;}
    body{
      display:grid;place-items:center;text-align:center;
      background:radial-gradient(140% 120% at 50% 0%, #070b1c 0%, #02030a 60%);
      color:#dce6ff;
      font-family:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      padding:24px;
    }
    .star{width:14px;height:14px;border-radius:50%;background:#fff;margin:0 auto 22px;
      box-shadow:0 0 24px 6px rgba(79,140,255,.8);}
    h1{font-size:clamp(28px,7vw,44px);margin:0 0 10px;}
    .code{color:#7f8db3;letter-spacing:.3em;font-size:13px;margin-bottom:18px;}
    p{color:#9fb0d8;max-width:420px;margin:0 auto 26px;line-height:1.6;}
    a{display:inline-block;background:#4f8cff;color:#fff;text-decoration:none;
      padding:12px 22px;border-radius:12px;font-weight:600;
      box-shadow:0 0 18px rgba(79,140,255,.55);}
  </style>
</head>
<body>
  <main>
    <div class="star"></div>
    <div class="code">404</div>
    <h1>Dieser Gedanke existiert (noch) nicht.</h1>
    <p>Die angeforderte Seite wurde nicht gefunden. Kehre zu deinem digitalen Gehirn zurück und erschaffe ihn.</p>
    <a href="/">Zurück zum Gehirn</a>
  </main>
</body>
</html>
